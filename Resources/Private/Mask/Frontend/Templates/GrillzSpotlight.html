<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="Main">

    <div class="grillzilla-spotlight" data-spotlight>
        <f:if condition="{data.tx_mask_headline}">
            <h2 class="grillzilla-spotlight__headline">{data.tx_mask_headline}</h2>
        </f:if>

        <div class="grillzilla-spotlight__stage">
            <div class="grillzilla-spotlight__main-img-wrap">
                <f:for each="{data.tx_mask_items}" as="item" iteration="i">
                    <div class="grillzilla-spotlight__main-img {f:if(condition: i.isFirst, then: 'active')}"
                         data-index="{i.index}">
                        <f:if condition="{item.tx_mask_bild}">
                            <f:image image="{item.tx_mask_bild -> f:first()}"
                                     class="grillzilla-spotlight__img"
                                     alt="{item.tx_mask_name}" />
                        </f:if>
                    </div>
                </f:for>
            </div>

            <div class="grillzilla-spotlight__info">
                <f:for each="{data.tx_mask_items}" as="item" iteration="i">
                    <div class="grillzilla-spotlight__info-panel {f:if(condition: i.isFirst, then: 'active')}"
                         data-index="{i.index}">
                        <p class="grillzilla-spotlight__material">{item.tx_mask_material}</p>
                        <h3 class="grillzilla-spotlight__name">{item.tx_mask_name}</h3>
                        <p class="grillzilla-spotlight__desc">{item.tx_mask_beschreibung}</p>
                    </div>
                </f:for>
            </div>
        </div>

        <div class="grillzilla-spotlight__thumbs">
            <f:for each="{data.tx_mask_items}" as="item" iteration="i">
                <div class="grillzilla-spotlight__thumb {f:if(condition: i.isFirst, then: 'active')}"
                     data-index="{i.index}">
                    <f:if condition="{item.tx_mask_bild}">
                        <f:image image="{item.tx_mask_bild -> f:first()}"
                                 class="grillzilla-spotlight__thumb-img"
                                 alt="{item.tx_mask_name}" />
                    </f:if>
                </div>
            </f:for>
        </div>
    </div>

</f:section>
</html>
